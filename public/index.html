<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celestial Bunny Realm</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
<style>
/* Reset & Base */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Quicksand', sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  background-size: 400% 400%;
  animation: gradientBG 20s ease infinite;
  color: #fff;
  overflow-x: hidden;
}

/* Gradient Animation */
@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Hero Section */
.hero {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  padding: 5rem 2rem;
  position: relative;
  text-align: center;
}

.hero-content {
  flex: 1;
  min-width: 300px;
}

.title {
  font-size: 3rem;
  font-weight: 700;
  color: #fdfdfd;
  text-shadow: 2px 2px 15px rgba(0,0,0,0.5);
}

.subtitle {
  font-size: 1.5rem;
  margin: 1rem 0;
  color: #e0e0ff;
}

.enter-btn {
  padding: 1rem 2rem;
  font-size: 1.2rem;
  background: #6fa8dc;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  color: #fff;
  transition: all 0.3s ease;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

.enter-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 25px rgba(0,0,0,0.4);
  background: #4a7bb7;
}

.hero-image {
  flex: 1;
  min-width: 300px;
  margin-top: 2rem;
}

.hero-image img {
  width: 100%;
  max-width: 400px;
  border-radius: 30px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  transition: transform 0.5s ease;
}

.hero-image img:hover {
  transform: scale(1.05);
}

/* Cards Section */
.cards-section {
  padding: 5rem 2rem;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  text-align: center;
}

.cards-section h2 {
  font-size: 2.5rem;
  margin-bottom: 3rem;
  color: #f0f8ff;
  text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
}

.cards {
  display: flex;
  flex-wrap: wrap;
  gap: 2rem;
  justify-content: center;
}

.card {
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  overflow: hidden;
  width: 250px;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card h3 {
  font-size: 1.5rem;
  margin: 1rem 0 0.5rem 0;
  color: #e0e0ff;
}

.card p {
  padding: 0 1rem 1rem 1rem;
  color: #dfefff;
}

/* Carousel Section */
.carousel-section {
  padding: 5rem 2rem;
  text-align: center;
}

.carousel-section h2 {
  font-size: 2.5rem;
  margin-bottom: 3rem;
  color: #f0f8ff;
  text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
}

.carousel {
  overflow: hidden;
  position: relative;
  max-width: 90%;
  margin: 0 auto;
}

.carousel-track {
  display: flex;
  gap: 2rem;
  animation: scroll 30s linear infinite;
}

.carousel-track img {
  width: 300px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  transition: transform 0.3s ease;
}

.carousel-track img:hover {
  transform: scale(1.1);
}

/* Carousel Animation */
@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* Aurora Effect */
.aurora {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  background: radial-gradient(circle at 20% 30%, rgba(200, 255, 255, 0.2), transparent 50%),
              radial-gradient(circle at 80% 70%, rgba(150, 200, 255, 0.2), transparent 50%);
  animation: auroraMove 20s ease-in-out infinite alternate;
}

@keyframes auroraMove {
  0% { transform: translate(0,0) rotate(0deg); }
  100% { transform: translate(50px,50px) rotate(360deg); }
}

/* Responsive */
@media(max-width: 768px) {
  .hero { flex-direction: column; }
  .cards { flex-direction: column; align-items: center; }
  .carousel-track { animation-duration: 40s; }
}
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="aurora"></div>

<header class="hero">
  <div class="hero-content">
    <h1 class="title">Celestial Bunny Realm</h1>
    <p class="subtitle">Where fluff becomes legendary ✨</p>
    <button class="enter-btn">Enter the Meadow</button>
  </div>

  <div class="hero-image">
    <img src="https://lafeber.com/vet/wp-content/uploads/european-rabbit.jpg" alt="Cute Bunny">
  </div>
</header>

<section class="cards-section">
  <h2>Mythical Bunny Powers</h2>
  <div class="cards">
    <div class="card">
      <img src="https://www.environment.nsw.gov.au/sites/default/files/2024-09/rabbit-european-introduced-species-nl.jpg" alt="Cloud Hops">
      <h3>Cloud Hops</h3>
      <p>Leaping through cotton candy skies.</p>
    </div>

    <div class="card">
      <img src="https://www.ohiohollandlops.com/uploads/5/0/2/8/50280945/5976942.jpg" alt="Sir Flops-A-Lot">
      <h3>Sir Flops-A-Lot</h3>
      <p>Glowing fur under moonlight.</p>
    </div>

    <div class="card">
      <img src="https://image.petmd.com/files/styles/863x625/public/2023-08/netherland.dwarf_.jpg" alt="Sir Thumper">
      <h3>Sir Thumper</h3>
      <p>Cherry blossoms follow every hop.</p>
    </div>
  </div>
</section>

<section class="carousel-section">
  <h2>Fluffy Legends</h2>
  <div class="carousel">
    <div class="carousel-track">
      <img src="https://www.rd.com/wp-content/uploads/2021/04/GettyImages-1151644281-scaled.jpg?fit=696%2C465" alt="Legend Bunny 1">
      <img src="https://a-z-animals.com/media/2022/05/Keep-rabbits-out-of-your-garden-header.jpg" alt="Legend Bunny 2">
      <img src="https://www.tierschutzbund.de/fileadmin/_processed_/5/c/csm_Zwergkaninchen_grau-weiss_Einstreu_Holzhaus_c_dtschb_fee6b865d7.jpg" alt="Legend Bunny 3">
      <img src="https://pet-health-content-media.chewy.com/wp-content/uploads/2025/04/16141035/202503bec-202502how-much-do-rabbits-cost-1024x684.jpg" alt="Legend Bunny 4">
    </div>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
